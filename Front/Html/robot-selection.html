<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вибір робота | RoboSecurity</title>
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">RoboSecurity</a>

        <div class="header-search">
            <input type="text" id="searchRobotName" placeholder="Пошук за іменем..." oninput="filterRobots()">
            <button class="view-btn">🔍</button>
        </div>

        <div class="nav-links" id="navLinks">
        </div>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="pageTitle" style="margin: 0;">Всі роботи</h1>
            <button class="primary-btn" style="width: auto; padding: 10px 25px;" onclick="openAddModal()">+ Додати робота</button>
        </div>

        <div id="robotsContainer" class="robot-grid">
            <p>Завантаження роботів...</p>
        </div>
    </div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <h3>Додати нового робота</h3>
            <label>Назва:</label>
            <input type="text" id="addName" placeholder="Наприклад: Naruto">
            <label>IP Адреса:</label>
            <input type="text" id="addIp" placeholder="192.168.0.100">
            <label>URL Стріму:</label>
            <input type="text" id="addStream" placeholder="http://...">

            <button class="primary-btn" onclick="addNewRobot()">Створити</button>
            <button class="btn-secondary" onclick="closeAddModal()">Скасувати</button>
        </div>
    </div>

    <script src="../Js/header.js"></script>
    <script src="../Js/robots.js"></script>
    <script>
        renderHeader();
        loadRobots();
    </script>
</body>
</html>
