<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
    <header><a href="index.html" class="logo">RoboSecurity</a></header>
    <div class="main-content">
        <div class="form-container">
            <h2>Реєстрація</h2>
            <input type="email" id="regEmail" placeholder="Електронна пошта">
            <input type="password" id="regPassword" placeholder="Пароль">
            <input type="password" id="regConfirmPassword" placeholder="Підтвердження">
            <button class="primary-btn" style="background-color: #ffe4e1; color: #db7093;" onclick="handleRegister()">Створити акаунт</button>
        </div>
    </div>
    <script>
        async function handleRegister() {
            const regData = {
                userMail: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                confirmPassword: document.getElementById('regConfirmPassword').value,
                userRoleName: "user"
            };
            const response = await fetch('https://localhost:7193/Users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(regData)
            });
            if (response.ok) { alert("Успіх!"); location.href = 'login.html'; }
        }
    </script>
</body>
</html>
