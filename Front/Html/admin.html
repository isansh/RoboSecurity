<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Адмін-панель RoboSecurity</title>
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">RoboSecurity Admin</a>
        <div class="nav-links" id="navLinks">
            <button class="btn-logout" onclick="logout()">Вихід</button>
        </div>
    </header>

    <div class="container">
        <h1>Управління користувачами</h1>

        <div id="search-section" style="display: flex; align-items: center; gap: 10px;">
            <input type="text" id="searchEmail" placeholder="Введіть email для пошуку" style="margin: 0; width: 300px;">
            <button class="primary-btn" style="width: auto; margin: 0;" onclick="searchUser()">Знайти</button>
            <button class="btn-secondary" onclick="loadAllUsers()">Показати всіх</button>
        </div>

        <table id="usersTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Роль</th>
                    <th>Дії</th>
                </tr>
            </thead>
            <tbody id="usersBody"></tbody>
        </table>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Редагувати користувача</h3>
            <input type="hidden" id="editUserId">
            <input type="text" id="editEmail" placeholder="Email">
            <select id="editRoleId">
                <option value="1">Admin</option>
                <option value="2">User</option>
            </select>
            <input type="password" id="editPassword" placeholder="Новий пароль">
            <input type="password" id="editConfirmPassword" placeholder="Підтвердіть пароль">

            <button class="primary-btn" onclick="saveUserEdit()">Зберегти</button>
            <button class="btn-secondary" onclick="closeModal()">Скасувати</button>
        </div>
    </div>

    <script src="../Js/admin.js"></script>
</body>
</html>
