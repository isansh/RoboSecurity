<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Панель керування | RoboSecurity</title>
    <link rel="stylesheet" href="../Css/style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">RoboSecurity</a>
        <div class="nav-links" id="navLinks"></div>
    </header>

    <div class="container">
        <div class="main-grid">
            <div class="video-box">
                <img id="videoStream" style="width: 100%; height: 100%; object-fit: contain;" src="" alt="Очікування сигналу...">
            </div>

            <div class="right-panel">
                <div class="info-card">
                    <h2>🤖 Робот: <span id="dispName">...</span></h2>
                    <p><strong>ID:</strong> <span id="dispId">...</span></p>
                    <p><strong>IP:</strong> <span id="dispIp">...</span></p>
                    <p><strong>Статус:</strong> <span id="dispStatus">...</span></p>
                </div>

                <div class="controls-container">
                    <h3>Пульт керування</h3>
                    <div style="display: flex; gap: 30px; align-items: center;">
                        <div class="joystick-grid">
                            <button class="control-btn btn-up" onmousedown="move('forward')" onmouseup="stop()">⬆️</button>
                            <button class="control-btn btn-left" onmousedown="move('left')" onmouseup="stop()">⬅️</button>
                            <button class="control-btn btn-stop" onclick="stop()">🛑</button>
                            <button class="control-btn btn-right" onmousedown="move('right')" onmouseup="stop()">➡️</button>
                            <button class="control-btn btn-down" onmousedown="move('backward')" onmouseup="stop()">⬇️</button>
                        </div>

                        <div class="camera-tilt">
                            <p>Камера</p>
                            <button class="control-btn tilt-btn" onmousedown="move('cam-up')" onmouseup="stop()">🔼</button>
                            <button class="control-btn tilt-btn" onmousedown="move('cam-down')" onmouseup="stop()">🔽</button>
                        </div>
                    </div>
                </div>

                <div class="info-card" style="display: flex; flex-direction: column; gap: 10px;">
                    <button class="edit-btn" style="padding: 15px;" onclick="openEditModal()">📝 Редагувати дані</button>
                    <button class="del-btn" style="padding: 15px;" onclick="deleteThisRobot()">🗑 Видалити робота</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Редагувати робота</h3>
            <label>Назва:</label><input type="text" id="editName">
            <label>IP Адреса:</label><input type="text" id="editIp">
            <label>Статус:</label><input type="text" id="editStatus">
            <label>URL Стріму:</label><input type="text" id="editStream">
            <button class="primary-btn" onclick="saveEdit()">Зберегти</button>
            <button class="btn-secondary" onclick="closeModal()">Скасувати</button>
        </div>
    </div>

    <script src="../Js/header.js"></script>
    <script src="../Js/control.js"></script>
    <script>
        renderHeader();
        initControl();
    </script>
</body>
</html>
